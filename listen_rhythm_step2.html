<h2>リズムかるた：ステップ2（中学年・4/4拍子）</h2>

<div id="screen-level">
  <p>レベルを選んでください。</p>
  <button onclick="selectLevel(1)">レベル1（四分音符・八分音符２つセット・四分休符）</button><br>
  <button onclick="selectLevel(2)">レベル2（四分音符・八分音符２つセット・四分休符・八分休符２つセット）</button><br>
  <button onclick="selectLevel(3)">レベル3（四分音符・八分音符２つセット・十六分音符４つセット・四分休符・八分休符２つセット）</button><br>
</div>

<div id="screen-tempo" style="display:none;">
  <p>レベル <span id="levelLabel"></span> が選ばれました。</p>
  <p>テンポを選んでください。</p>
  <select id="tempoSelect">
      <option value="60">60</option>
      <option value="80">80</option>
      <option value="100">100</option>
      <option value="120">120</option>
  </select>
  <br><br>
  <button onclick="startQuiz()">▶ スタート</button>
  <button onclick="backToLevel()">← レベル選択に戻る</button>
</div>

<div id="screen-quiz" style="display:none;">
  <p id="questionInfo"></p>
  <p id="status"></p>

  <button id="playBtn" onclick="playCurrentRhythm()">▶ 流す</button>
  <button id="nextBtn" onclick="nextQuestion()" disabled>次の問題へ</button>

  <div id="choices"></div>
</div>

<script>
/* 拍数（1単位＝四分音符1拍） */
const NOTE_BEATS = {
  "quarter": 1,
  "eighth_pair": 1,        // 八分音符2つで1拍
  "sixteenth_group": 1,    // 十六分音符4つで1拍
  "quarter_rest": 1,
  "eighth_rest_pair": 1    // 八分休符2つで1拍
};

/* レベルごとの使用音符・休符 */
const LEVEL_NOTES = {
  1: ["quarter", "eighth_pair", "quarter_rest"],
  2: ["quarter", "eighth_pair", "quarter_rest", "eighth_rest_pair"],
  3: ["quarter", "eighth_pair", "sixteenth_group", "quarter_rest", "eighth_rest_pair"]
};

/* 休符だけ統合（音符は統合しない） */
function mergeRests(rhythm) {
  let merged = [];
  let restBuffer = 0;

  rhythm.forEach(note => {
    if (note.includes("rest")) {
      restBuffer += NOTE_BEATS[note];
    } else {
      if (restBuffer > 0) {
        if (restBuffer === 1) merged.push("quarter_rest");
        // ここでは1拍単位のみ扱う（八分休符ペアも1拍として扱う）
        restBuffer = 0;
      }
      merged.push(note);
    }
  });

  if (restBuffer > 0) {
    if (restBuffer === 1) merged.push("quarter_rest");
  }

  return merged;
}

/* 一小節（4拍）を必ず満たすリズム生成 */
function generateRhythm(level) {
  const allowed = LEVEL_NOTES[level];
  let rhythm = [];
  let sum = 0;

  while (sum < 4) {
    const note = allowed[Math.floor(Math.random() * allowed.length)];
    const length = NOTE_BEATS[note];
    if (sum + length <= 4) {
      rhythm.push(note);
      sum += length;
    }
  }

  return rhythm; // 表示時に休符統合
}

/* 柔らかい時報音 */
function playMorse(time, duration, ctx) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.value = 520;

  osc.connect(gain);
  gain.connect(ctx.destination);

  gain.gain.setValueAtTime(1.0, time);
  gain.gain.linearRampToValueAtTime(0.0, time + duration);

  osc.start(time);
  osc.stop(time + duration);
}

/* カスタネット（拍位置） */
function playCastanet(time, ctx) {
  const noise = ctx.createBufferSource();
  const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 200);
  }
  const filter = ctx.createBiquadFilter();
  filter.type = "highpass";
  filter.frequency.value = 1500;
  noise.buffer = buffer;
  noise.connect(filter);
  filter.connect(ctx.destination);
  noise.start(time);
}

/* リズム再生：八分2つセット・十六分4つセットを打ち直しで鳴らす */
function playRhythm(rhythm, tempo) {
  const ctx = new AudioContext();
  const beat = 60 / tempo;
  let t = ctx.currentTime;

  /* 予備拍（4拍） */
  for (let i = 0; i < 4; i++) {
    playCastanet(t, ctx);
    t += beat;
  }

  const start = t;

  /* 一小節間カスタネット（4拍） */
  for (let i = 0; i < 4; i++) {
    playCastanet(start + i * beat, ctx);
  }

  /* 本体：1拍ごとに処理し、その中でセット音符を細分化して鳴らす */
  let cur = start;
  rhythm.forEach(note => {
    const durBeat = NOTE_BEATS[note]; // ここでは常に1拍

    if (note === "quarter") {
      // 四分音符：1拍ぶん鳴らす
      playMorse(cur, beat, ctx);
      cur += beat;
    } else if (note === "eighth_pair") {
      // 八分音符2つ：0.5拍ずつ2回鳴らす
      playMorse(cur, beat * 0.5, ctx);
      playMorse(cur + beat * 0.5, beat * 0.5, ctx);
      cur += beat;
    } else if (note === "sixteenth_group") {
      // 十六分音符4つ：0.25拍ずつ4回鳴らす
      playMorse(cur, beat * 0.25, ctx);
      playMorse(cur + beat * 0.25, beat * 0.25, ctx);
      playMorse(cur + beat * 0.5, beat * 0.25, ctx);
      playMorse(cur + beat * 0.75, beat * 0.25, ctx);
      cur += beat;
    } else if (note === "quarter_rest") {
      // 四分休符：1拍ぶん無音
      cur += beat;
    } else if (note === "eighth_rest_pair") {
      // 八分休符2つ：0.5拍ずつ2回分無音
      cur += beat;
    } else {
      // 万が一未知の記号が来た場合も1拍進める
      cur += beat;
    }
  });
}

/* 見た目比較（音符の並びそのものを比較） */
function isSamePattern(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

/* ダミー生成（正解と重複禁止） */
function generateChoices(correct, level) {
  let choices = [correct];
  while (choices.length < 4) {
    const wrong = generateRhythm(level);
    if (!isSamePattern(wrong, correct)) {
      choices.push(wrong);
    }
  }
  return choices.sort(() => Math.random() - 0.5);
}

/* SVG譜例：八分2つセット・十六分4つセットを見た目で描く */
function drawNoteSVG(note) {
  switch(note) {
    case "quarter":
      return `<svg width="40" height="80">
        <circle cx="20" cy="50" r="10" fill="black"/>
        <rect x="25" y="10" width="4" height="40" fill="black"/>
      </svg>`;
    case "eighth_pair":
      return `<svg width="60" height="80">
        <circle cx="15" cy="50" r="8" fill="black"/>
        <rect x="20" y="20" width="3" height="30" fill="black"/>
        <circle cx="35" cy="50" r="8" fill="black"/>
        <rect x="40" y="20" width="3" height="30" fill="black"/>
        <rect x="20" y="20" width="23" height="3" fill="black"/>
      </svg>`;
    case "sixteenth_group":
      return `<svg width="80" height="80">
        <circle cx="10" cy="50" r="6" fill="black"/>
        <rect x="14" y="25" width="2" height="25" fill="black"/>
        <circle cx="25" cy="50" r="6" fill="black"/>
        <rect x="29" y="25" width="2" height="25" fill="black"/>
        <circle cx="40" cy="50" r="6" fill="black"/>
        <rect x="44" y="25" width="2" height="25" fill="black"/>
        <circle cx="55" cy="50" r="6" fill="black"/>
        <rect x="59" y="25" width="2" height="25" fill="black"/>
        <rect x="14" y="25" width="47" height="2" fill="black"/>
        <rect x="14" y="30" width="47" height="2" fill="black"/>
      </svg>`;
    case "quarter_rest":
      return `<svg width="40" height="80">
        <path d="M20 10 L25 20 L15 30 L25 40 L15 50" stroke="black" stroke-width="4" fill="none"/>
      </svg>`;
    case "eighth_rest_pair":
      return `<svg width="40" height="80">
        <path d="M20 10 L25 20 L20 30" stroke="black" stroke-width="4" fill="none"/>
        <path d="M25 20 L30 30 L25 40" stroke="black" stroke-width="4" fill="none"/>
      </svg>`;
  }
}

/* 譜例表示（休符だけ統合してから描画） */
function displayChoices(choices, correct) {
  const div = document.getElementById("choices");
  div.innerHTML = "";
  choices.forEach(choice => {
    const displayRhythm = mergeRests(choice);
    const btn = document.createElement("button");
    btn.innerHTML =
      `<span style="font-size:20px; font-weight:bold;">4/4</span> ` +
      displayRhythm.map(n => drawNoteSVG(n)).join("");
    btn.onclick = () => checkAnswer(choice, correct);
    div.appendChild(btn);
    div.appendChild(document.createElement("br"));
  });
}

/* 画面状態 */
let selectedLevel = null;
let tempo = 80;
let currentQuestion = null;
let questionCount = 0;
let score = 0;
let startTime = 0;

function selectLevel(level) {
  selectedLevel = level;
  document.getElementById("levelLabel").innerText = level;
  document.getElementById("screen-level").style.display = "none";
  document.getElementById("screen-tempo").style.display = "block";
}

function backToLevel() {
  document.getElementById("screen-tempo").style.display = "none";
  document.getElementById("screen-quiz").style.display = "none";
  document.getElementById("screen-level").style.display = "block";
  document.getElementById("status").innerText = "";
  document.getElementById("questionInfo").innerText = "";
  document.getElementById("choices").innerHTML = "";
}

function startQuiz() {
  tempo = parseInt(document.getElementById("tempoSelect").value);
  score = 0;
  questionCount = 0;
  startTime = Date.now();
  document.getElementById("screen-tempo").style.display = "none";
  document.getElementById("screen-quiz").style.display = "block";
  nextQuestion();
}

function playCurrentRhythm() {
  if (currentQuestion) {
    playRhythm(currentQuestion, tempo);
  }
}

function nextQuestion() {
  if (questionCount >= 10) {
    finishQuiz();
    return;
  }

  document.getElementById("status").innerText = "";
  document.getElementById("nextBtn").disabled = true;

  questionCount++;
  document.getElementById("questionInfo").innerText =
    "問題 " + questionCount + " / 10";

  currentQuestion = generateRhythm(selectedLevel);

  const choices = generateChoices(currentQuestion, selectedLevel);
  displayChoices(choices, currentQuestion);
}

function checkAnswer(selected, correct) {
  if (isSamePattern(selected, correct)) {
    score++;
    document.getElementById("status").innerText = "⭕ 正解！";
  } else {
    document.getElementById("status").innerText = "❌ 不正解…";
  }
  document.getElementById("nextBtn").disabled = false;
}

function finishQuiz() {
  const time = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById("questionInfo").innerText = "終了（全10問）";
  document.getElementById("status").innerText =
    "総得点：" + score + "点　タイム：" + time + "秒";
  document.getElementById("choices").innerHTML =
    `<p><button onclick="backToLevel()">← レベル選択に戻る</button></p>`;
  document.getElementById("nextBtn").disabled = true;
}
</script>
