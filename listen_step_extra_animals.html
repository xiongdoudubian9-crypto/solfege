<h2>ステップ（どうぶつの鳴き声）</h2>

<p id="questionInfo"></p>
<p id="status"></p>

<button onclick="playQuestion()">▶ 音を聞く</button>
<button onclick="checkAnswer('up')">↑ 高くなった</button>
<button onclick="checkAnswer('down')">↓ 低くなった</button>

<script>
    // 10問分のランダム問題を生成（動物はノイズの強さで判定）
    const questions = [];
    for (let i = 0; i < 10; i++) {
        const base = Math.random() * 0.4 + 0.3;   // ノイズの強さ（低め）
        const diff = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.3);
        questions.push({ baseLevel: base, secondLevel: base + diff });
    }

    let currentIndex = 0;
    let correctAnswer = null;
    let answered = false;

    // ★ 総得点
    let score = 0;

    // ★ タイム計測
    let startTime = Date.now();

    function updateQuestionInfo() {
        document.getElementById("questionInfo").innerText =
            "問題 " + (currentIndex + 1) + " / 10";
    }

    // ★ 動物の鳴き声風ノイズ
    function playAnimal(level) {
        const ctx = new AudioContext();
        const bufferSize = 2 * ctx.sampleRate;
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const output = noiseBuffer.getChannelData(0);

        // ホワイトノイズ生成
        for (let i = 0; i < bufferSize; i++) {
            output[i] = (Math.random() * 2 - 1) * level;
        }

        const noise = ctx.createBufferSource();
        noise.buffer = noiseBuffer;

        // フィルターで動物っぽい音にする
        const filter = ctx.createBiquadFilter();
        filter.type = "bandpass";
        filter.frequency.value = 600 + Math.random() * 800;

        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.8, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        noise.start();
        noise.stop(ctx.currentTime + 0.8);
    }

    function playQuestion() {
        if (currentIndex >= questions.length) return;

        answered = false;
        document.getElementById("status").innerText = "";

        const q = questions[currentIndex];
        correctAnswer = q.secondLevel > q.baseLevel ? "up" : "down";

        playAnimal(q.baseLevel);
        setTimeout(() => playAnimal(q.secondLevel), 900);
    }

    function checkAnswer(ans) {
        if (currentIndex >= questions.length || answered) return;
        answered = true;

        if (ans === correctAnswer) {
            score++;
            document.getElementById("status").innerText = "⭕ 正解！";
        } else {
            document.getElementById("status").innerText = "❌ 不正解…";
        }

        currentIndex++;
        if (currentIndex < questions.length) {
            updateQuestionInfo();
        } else {
            let endTime = Date.now();
            let time = Math.floor((endTime - startTime) / 1000);

            document.getElementById("questionInfo").innerText = "終了（全10問）";
            document.getElementById("status").innerText +=
                "　総得点：" + score + "点　タイム：" + time + "秒";
        }
    }

    updateQuestionInfo();
</script>
