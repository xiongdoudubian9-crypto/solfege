<script>
    // 10問分のランダム問題を生成
    const questions = [];
    for (let i = 0; i < 10; i++) {
        const base = 440; // ピアノの基準音
        const diff = (Math.random() > 0.5 ? 1 : -1) * (40 + Math.random() * 60);
        questions.push({ baseFreq: base, secondFreq: base + diff });
    }

    let currentIndex = 0;
    let correctAnswer = null;
    let answered = false;

    // ★ 追加：総得点
    let score = 0;

    // ★ 追加：タイム計測
    let startTime = Date.now();

    function updateQuestionInfo() {
        document.getElementById("questionInfo").innerText =
            "問題 " + (currentIndex + 1) + " / 10";
    }

    function playTone(freq) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(ctx.destination);

        gain.gain.setValueAtTime(0.7, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);

        osc.start();
        osc.stop(ctx.currentTime + 1.0);
    }

    function playQuestion() {
        if (currentIndex >= questions.length) return;

        answered = false;
        document.getElementById("status").innerText = "";

        const q = questions[currentIndex];
        correctAnswer = q.secondFreq > q.baseFreq ? "up" : "down";

        playTone(q.baseFreq);
        setTimeout(() => playTone(q.secondFreq), 800);
    }

    function checkAnswer(ans) {
        if (currentIndex >= questions.length || answered) return;
        answered = true;

        if (ans === correctAnswer) {
            score++; // ★ 正解なら得点アップ
            document.getElementById("status").innerText = "⭕ 正解！";
        } else {
            document.getElementById("status").innerText = "❌ 不正解…";
        }

        currentIndex++;
        if (currentIndex < questions.length) {
            updateQuestionInfo();
        } else {
            // ★ 終了処理：タイム計測
            let endTime = Date.now();
            let time = Math.floor((endTime - startTime) / 1000);

            document.getElementById("questionInfo").innerText = "終了（全10問）";
            document.getElementById("status").innerText +=
                "　総得点：" + score + "点　タイム：" + time + "秒";
        }
    }

    updateQuestionInfo();
</script>
