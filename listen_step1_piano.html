<h2>ステップ1（ピアノ）</h2>

<p id="questionInfo"></p>
<p id="status"></p>

<button onclick="playQuestion()">▶ 音を聞く</button>
<button onclick="checkAnswer('up')">↑ 高くなった</button>
<button onclick="checkAnswer('down')">↓ 低くなった</button>

<script>
    const questions = [];
    for (let i = 0; i < 10; i++) {
        const base = 440;
        const diff = (Math.random() > 0.5 ? 1 : -1) * (40 + Math.random() * 60);
        questions.push({ baseFreq: base, secondFreq: base + diff });
    }

    let currentIndex = 0;
    let correctAnswer = null;
    let answered = false;
    let score = 0;
    let startTime = Date.now();

    function updateQuestionInfo() {
        document.getElementById("questionInfo").innerText =
            "問題 " + (currentIndex + 1) + " / 10";
    }

    function playPiano(freq) {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(ctx.destination);

        gain.gain.setValueAtTime(0.8, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

        osc.start();
        osc.stop(ctx.currentTime + 1.2);
    }

    function playQuestion() {
        if (currentIndex >= questions.length) return;

        answered = false;
        document.getElementById("status").innerText = "";

        const q = questions[currentIndex];
        correctAnswer = q.secondFreq > q.baseFreq ? "up" : "down";

        playPiano(q.baseFreq);
        setTimeout(() => playPiano(q.secondFreq), 900);
    }

    function checkAnswer(ans) {
        if (currentIndex >= questions.length || answered) return;
        answered = true;

        if (ans === correctAnswer) {
            score++;
            document.getElementById("status").innerText = "⭕ 正解！";
        } else {
            document.getElementById("status").innerText = "❌ 不正解…";
        }

        currentIndex++;
        if (currentIndex < questions.length) {
            updateQuestionInfo();
        } else {
            let endTime = Date.now();
            let time = Math.floor((endTime - startTime) / 1000);

            document.getElementById("questionInfo").innerText = "終了（全10問）";
            document.getElementById("status").innerText +=
                "　総得点：" + score + "点　タイム：" + time + "秒";
        }
    }

    updateQuestionInfo();
</script>
