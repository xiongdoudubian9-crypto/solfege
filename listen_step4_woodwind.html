<h2>ステップ4（木管）</h2>

<p id="questionInfo"></p>
<p id="status"></p>

<button onclick="playQuestion()">▶ 音を聞く</button>
<button onclick="checkAnswer('up')">↑ 高くなった</button>
<button onclick="checkAnswer('down')">↓ 低くなった</button>

<script>
    // 10問分のランダム問題を生成
    const questions = [];
    for (let i = 0; i < 10; i++) {
        const base = 580; // 木管の基準音（やや高め）
        const diff = (Math.random() > 0.5 ? 1 : -1) * (50 + Math.random() * 70);
        questions.push({ baseFreq: base, secondFreq: base + diff });
    }

    let currentIndex = 0;
    let correctAnswer = null;
    let answered = false;

    // ★ 総得点
    let score = 0;

    // ★ タイム計測
    let startTime = Date.now();

    function updateQuestionInfo() {
        document.getElementById("questionInfo").innerText =
            "問題 " + (currentIndex + 1) + " / 10";
    }

    // ★ 木管らしい音色（triangle波＋lowpassフィルター）
    function playWoodwind(freq) {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        osc.type = "triangle"; // 木管らしい柔らかい音
        osc.frequency.value = freq;

        filter.type = "lowpass";
        filter.frequency.value = 1500; // 木管の柔らかい帯域

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        gain.gain.setValueAtTime(0.6, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.4);

        osc.start();
        osc.stop(ctx.currentTime + 1.4);
    }

    function playQuestion() {
        if (currentIndex >= questions.length) return;

        answered = false;
        document.getElementById("status").innerText = "";

        const q = questions[currentIndex];
        correctAnswer = q.secondFreq > q.baseFreq ? "up" : "down";

        playWoodwind(q.baseFreq);
        setTimeout(() => playWoodwind(q.secondFreq), 900);
    }

    function checkAnswer(ans) {
        if (currentIndex >= questions.length || answered) return;
        answered = true;

        if (ans === correctAnswer) {
            score++;
            document.getElementById("status").innerText = "⭕ 正解！";
        } else {
            document.getElementById("status").innerText = "❌ 不正解…";
        }

        currentIndex++;
        if (currentIndex < questions.length) {
            updateQuestionInfo();
        } else {
            let endTime = Date.now();
            let time = Math.floor((endTime - startTime) / 1000);

            document.getElementById("questionInfo").innerText = "終了（全10問）";
            document.getElementById("status").innerText +=
                "　総得点：" + score + "点　タイム：" + time + "秒";
        }
    }

    updateQuestionInfo();
</script>
