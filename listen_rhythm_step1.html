<h2>リズムかるた：ステップ1（低学年）</h2>

<p>レベルを選んでください。</p>

<select id="levelSelect">
    <option value="1">レベル1（四分音符・四分休符）</option>
    <option value="2">レベル2（二分音符・四分音符・四分休符）</option>
    <option value="3">レベル3（全音符・二分音符・四分音符・四分休符）</option>
    <option value="4">レベル4（全音符・二分音符・四分音符・四分休符・二分休符）</option>
    <option value="5">レベル5（レベル4の拡張）</option>
    <option value="6">レベル6（付点二分音符を追加）</option>
</select>

<p>テンポを選んでください。</p>
<select id="tempoSelect">
    <option value="60">60</option>
    <option value="80">80</option>
    <option value="100">100</option>
    <option value="120">120</option>
</select>

<button onclick="startLevel()">▶ スタート</button>

<p id="questionInfo"></p>
<p id="status"></p>

<div id="choices"></div>

<script>
/* -----------------------------
   音符の拍数
----------------------------- */
const NOTE = {
    "whole": 4,
    "half": 2,
    "half_rest": 2,
    "quarter": 1,
    "quarter_rest": 1,
    "dotted_half": 3
};

/* -----------------------------
   レベルごとの使用可能音符
----------------------------- */
const LEVEL_NOTES = {
    1: ["quarter", "quarter_rest"],
    2: ["half", "quarter", "quarter_rest"],
    3: ["whole", "half", "quarter", "quarter_rest"],
    4: ["whole", "half", "quarter", "quarter_rest", "half_rest"],
    5: ["whole", "half", "quarter", "quarter_rest", "half_rest"],
    6: ["whole", "dotted_half", "half", "quarter", "quarter_rest", "half_rest"]
};

/* -----------------------------
   SVG譜例描画（教科書レベル）
----------------------------- */
function drawNoteSVG(note) {
    switch(note) {
        case "quarter": // 四分音符
            return `<svg width="40" height="80">
                <circle cx="20" cy="50" r="10" fill="black"/>
                <rect x="25" y="10" width="4" height="40" fill="black"/>
            </svg>`;
        case "half": // 二分音符
            return `<svg width="40" height="80">
                <circle cx="20" cy="50" r="10" fill="white" stroke="black" stroke-width="3"/>
                <rect x="25" y="10" width="4" height="40" fill="black"/>
            </svg>`;
        case "whole": // 全音符
            return `<svg width="40" height="80">
                <ellipse cx="20" cy="50" rx="14" ry="10" fill="white" stroke="black" stroke-width="3"/>
            </svg>`;
        case "quarter_rest": // 四分休符
            return `<svg width="40" height="80">
                <path d="M20 10 L25 20 L15 30 L25 40 L15 50" stroke="black" stroke-width="4" fill="none"/>
            </svg>`;
        case "half_rest": // 二分休符
            return `<svg width="40" height="80">
                <rect x="10" y="30" width="20" height="10" fill="black"/>
            </svg>`;
        case "dotted_half": // 付点二分音符
            return `<svg width="60" height="80">
                <circle cx="20" cy="50" r="10" fill="white" stroke="black" stroke-width="3"/>
                <rect x="25" y="10" width="4" height="40" fill="black"/>
                <circle cx="45" cy="50" r="5" fill="black"/>
            </svg>`;
    }
}

/* -----------------------------
   音源：カスタネット（予備拍・テンポ刻み）
----------------------------- */
function playCastanet(time, ctx) {
    const noise = ctx.createBufferSource();
    const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 200);
    }

    const filter = ctx.createBiquadFilter();
    filter.type = "highpass";
    filter.frequency.value = 1500;

    noise.buffer = buffer;
    noise.connect(filter);
    filter.connect(ctx.destination);

    noise.start(time);
}

/* -----------------------------
   音源：モールス信号（リズム本体）
----------------------------- */
function playMorse(time, duration, ctx) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.value = 900;

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.setValueAtTime(1.0, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

    osc.start(time);
    osc.stop(time + duration);
}

/* -----------------------------
   リズム生成（1小節＝4拍）
----------------------------- */
function generateRhythm(level) {
    const allowed = LEVEL_NOTES[level];
    let rhythm = [];
    let sum = 0;

    while (sum < 4) {
        const note = allowed[Math.floor(Math.random() * allowed.length)];
        const length = NOTE[note];

        if (sum + length <= 4) {
            rhythm.push(note);
            sum += length;
        }
    }
    return rhythm;
}

/* -----------------------------
   リズム再生（完全同期）
----------------------------- */
function playRhythm(rhythm, tempo) {
    const ctx = new AudioContext();
    const beat = 60 / tempo;

    let t = ctx.currentTime;

    // 予備拍4つ
    for (let i = 0; i < 4; i++) {
        playCastanet(t, ctx);
        t += beat;
    }

    // 本体（テンポ刻みと完全同期）
    rhythm.forEach(note => {
        const dur = NOTE[note] * beat;

        playMorse(t, dur, ctx);   // 本体
        playCastanet(t, ctx);     // テンポ刻み

        t += dur;
    });
}

/* -----------------------------
   選択肢生成
----------------------------- */
function generateChoices(correct, level) {
    let choices = [correct];

    while (choices.length < 3) {
        const wrong = generateRhythm(level);
        if (JSON.stringify(wrong) !== JSON.stringify(correct)) {
            choices.push(wrong);
        }
    }

    choices.sort(() => Math.random() - 0.5);
    return choices;
}

/* -----------------------------
   譜例表示
----------------------------- */
function displayChoices(choices, correct) {
    const div = document.getElementById("choices");
    div.innerHTML = "";

    choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerHTML = choice.map(n => drawNoteSVG(n)).join("");
        btn.onclick = () => checkAnswer(choice, correct);
        div.appendChild(btn);
        div.appendChild(document.createElement("br"));
    });
}

/* -----------------------------
   レベル開始
----------------------------- */
let currentIndex = 0;
let score = 0;
let startTime = 0;
let currentCorrect = null;

function startLevel() {
    currentIndex = 0;
    score = 0;
    startTime = Date.now();
    nextQuestion();
}

function nextQuestion() {
    const level = parseInt(document.getElementById("levelSelect").value);
    const tempo = parseInt(document.getElementById("tempoSelect").value);

    if (currentIndex >= 10) {
        finishLevel();
        return;
    }

    document.getElementById("status").innerText = "";
    document.getElementById("questionInfo").innerText =
        "問題 " + (currentIndex + 1) + " / 10";

    const rhythm = generateRhythm(level);
    currentCorrect = rhythm;

    playRhythm(rhythm, tempo);

    const choices = generateChoices(rhythm, level);
    displayChoices(choices, rhythm);

    currentIndex++;
}

/* -----------------------------
   正誤判定
----------------------------- */
function checkAnswer(selected, correct) {
    if (JSON.stringify(selected) === JSON.stringify(correct)) {
        score++;
        document.getElementById("status").innerText = "⭕ 正解！";
    } else {
        document.getElementById("status").innerText = "❌ 不正解…";
    }

    setTimeout(nextQuestion, 800);
}

/* -----------------------------
   終了
----------------------------- */
function finishLevel() {
    let time = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("questionInfo").innerText = "終了（全10問）";
    document.getElementById("status").innerText =
        "総得点：" + score + "点　タイム：" + time + "秒";

    document.getElementById("choices").innerHTML =
        `<p><a href="listen_rhythm_step1.html">← レベル選択に戻る</a></p>`;
}
</script>

<p><a href="listen_rhythm.html">← リズムかるたに戻る</a></p>
