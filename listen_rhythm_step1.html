<h2>リズムかるた：ステップ1（低学年）</h2>

<div id="screen-level">
  <p>レベルを選んでください。</p>
  <button onclick="selectLevel(1)">レベル1（四分音符・四分休符）</button><br>
  <button onclick="selectLevel(2)">レベル2（二分音符・四分音符・四分休符）</button><br>
  <button onclick="selectLevel(3)">レベル3（全音符・二分音符・四分音符・四分休符）</button><br>
  <button onclick="selectLevel(4)">レベル4（全音符・二分音符・四分音符・四分休符・二分休符）</button><br>
  <button onclick="selectLevel(5)">レベル5（レベル4の拡張）</button><br>
  <button onclick="selectLevel(6)">レベル6（付点二分音符を追加）</button><br>
</div>

<div id="screen-tempo" style="display:none;">
  <p>レベル <span id="levelLabel"></span> が選ばれました。</p>
  <p>テンポを選んでください。</p>
  <select id="tempoSelect">
      <option value="60">60</option>
      <option value="80">80</option>
      <option value="100">100</option>
      <option value="120">120</option>
  </select>
  <br><br>
  <button onclick="startQuiz()">▶ スタート</button>
  <button onclick="backToLevel()">← レベル選択に戻る</button>
</div>

<div id="screen-quiz" style="display:none;">
  <p id="questionInfo"></p>
  <p id="status"></p>

  <button id="playBtn" onclick="playCurrentRhythm()">▶ リズムを聞く</button>
  <button id="nextBtn" onclick="nextQuestion()" disabled>次の問題へ</button>

  <div id="choices"></div>
</div>

<script>
/* 拍数定義 */
const NOTE = {
  "whole": 4,
  "half": 2,
  "half_rest": 2,
  "quarter": 1,
  "quarter_rest": 1,
  "dotted_half": 3
};

/* レベルごとの使用音符 */
const LEVEL_NOTES = {
  1: ["quarter", "quarter_rest"],
  2: ["half", "quarter", "quarter_rest"],
  3: ["whole", "half", "quarter", "quarter_rest"],
  4: ["whole", "half", "quarter", "quarter_rest", "half_rest"],
  5: ["whole", "half", "quarter", "quarter_rest", "half_rest"],
  6: ["whole", "dotted_half", "half", "quarter", "quarter_rest", "half_rest"]
};

/* SVG譜例 */
function drawNoteSVG(note) {
  switch(note) {
    case "quarter":
      return `<svg width="40" height="80">
        <circle cx="20" cy="50" r="10" fill="black"/>
        <rect x="25" y="10" width="4" height="40" fill="black"/>
      </svg>`;
    case "half":
      return `<svg width="40" height="80">
        <circle cx="20" cy="50" r="10" fill="white" stroke="black" stroke-width="3"/>
        <rect x="25" y="10" width="4" height="40" fill="black"/>
      </svg>`;
    case "whole":
      return `<svg width="40" height="80">
        <ellipse cx="20" cy="50" rx="14" ry="10" fill="white" stroke="black" stroke-width="3"/>
      </svg>`;
    case "quarter_rest":
      return `<svg width="40" height="80">
        <path d="M20 10 L25 20 L15 30 L25 40 L15 50" stroke="black" stroke-width="4" fill="none"/>
      </svg>`;
    case "half_rest":
      return `<svg width="40" height="80">
        <rect x="10" y="30" width="20" height="10" fill="black"/>
      </svg>`;
    case "dotted_half":
      return `<svg width="60" height="80">
        <circle cx="20" cy="50" r="10" fill="white" stroke="black" stroke-width="3"/>
        <rect x="25" y="10" width="4" height="40" fill="black"/>
        <circle cx="45" cy="50" r="5" fill="black"/>
      </svg>`;
  }
}

/* カスタネット */
function playCastanet(time, ctx) {
  const noise = ctx.createBufferSource();
  const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 200);
  }
  const filter = ctx.createBiquadFilter();
  filter.type = "highpass";
  filter.frequency.value = 1500;
  noise.buffer = buffer;
  noise.connect(filter);
  filter.connect(ctx.destination);
  noise.start(time);
}

/* モールス信号（拍の長さを維持） */
function playMorse(time, duration, ctx) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "square";
  osc.frequency.value = 900;

  osc.connect(gain);
  gain.connect(ctx.destination);

  gain.gain.setValueAtTime(1.0, time);
  gain.gain.setValueAtTime(1.0, time + duration - 0.01);
  gain.gain.linearRampToValueAtTime(0.0, time + duration);

  osc.start(time);
  osc.stop(time + duration);
}

/* リズム生成 */
function generateRhythm(level) {
  const allowed = LEVEL_NOTES[level];
  let rhythm = [];
  let sum = 0;
  while (sum < 4) {
    const note = allowed[Math.floor(Math.random() * allowed.length)];
    const length = NOTE[note];
    if (sum + length <= 4) {
      rhythm.push(note);
      sum += length;
    }
  }
  return rhythm;
}

/* リズム再生（完全同期＋休符無音） */
function playRhythm(rhythm, tempo) {
  const ctx = new AudioContext();
  const beat = 60 / tempo;
  let t = ctx.currentTime;

  for (let i = 0; i < 4; i++) {
    playCastanet(t, ctx);
    t += beat;
  }

  const start = t;
  const totalBeats = rhythm.reduce((sum, note) => sum + NOTE[note], 0);

  for (let i = 0; i < totalBeats; i++) {
    playCastanet(start + i * beat, ctx);
  }

  let cur = start;
  rhythm.forEach(note => {
    const dur = NOTE[note] * beat;
    if (note.includes("rest")) {
      cur += dur;
    } else {
      playMorse(cur, dur, ctx);
      cur += dur;
    }
  });
}

/* 譜例の見た目で比較（正解判定のズレ防止） */
function normalize(rhythm) {
  return rhythm.map(n => NOTE[n]).sort((a,b)=>a-b);
}
function isSamePattern(a, b) {
  return JSON.stringify(normalize(a)) === JSON.stringify(normalize(b));
}

/* 選択肢生成（見た目が同じ譜例は除外） */
function generateChoices(correct, level) {
  let choices = [correct];
  while (choices.length < 4) {
    const wrong = generateRhythm(level);
    if (!isSamePattern(wrong, correct)) {
      choices.push(wrong);
    }
  }
  choices.sort(() => Math.random() - 0.5);
  return choices;
}

/* 譜例表示（4/4 拍子を追加） */
function displayChoices(choices, correct) {
  const div = document.getElementById("choices");
  div.innerHTML = "";
  choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.innerHTML =
      `<span style="font-size:20px; font-weight:bold;">4/4</span> ` +
      choice.map(n => drawNoteSVG(n)).join("");
    btn.onclick = () => checkAnswer(choice, correct);
    div.appendChild(btn);
    div.appendChild(document.createElement("br"));
  });
}

let selectedLevel = null;
let tempo = 80;
let currentQuestion = null;
let questionCount = 0;
let score = 0;
let startTime = 0;

function selectLevel(level) {
  selectedLevel = level;
  document.getElementById("levelLabel").innerText = level;
  document.getElementById("screen-level").style.display = "none";
  document.getElementById("screen-tempo").style.display = "block";
}

function backToLevel() {
  document.getElementById("screen-tempo").style.display = "none";
  document.getElementById("screen-quiz").style.display = "none";
  document.getElementById("screen-level").style.display = "block";
  document.getElementById("status").innerText = "";
  document.getElementById("questionInfo").innerText = "";
  document.getElementById("choices").innerHTML = "";
}

function startQuiz() {
  tempo = parseInt(document.getElementById("tempoSelect").value);
  score = 0;
  questionCount = 0;
  startTime = Date.now();
  document.getElementById("screen-tempo").style.display = "none";
  document.getElementById("screen-quiz").style.display = "block";
  document.getElementById("nextBtn").disabled = true;
  nextQuestion();
}

function playCurrentRhythm() {
  if (currentQuestion) {
    playRhythm(currentQuestion, tempo);
  }
}

function nextQuestion() {
  if (questionCount >= 10) {
    finishQuiz();
    return;
  }

  document.getElementById("status").innerText = "";
  document.getElementById("nextBtn").disabled = true;

  questionCount++;
  document.getElementById("questionInfo").innerText =
    "問題 " + questionCount + " / 10";

  /* ★ 正解のリズムを生成 */
  currentQuestion = generateRhythm(selectedLevel);

  /* ★ 正しいリズムを再生 */
  playRhythm(currentQuestion, tempo);

  /* ★ 正解は currentQuestion を使う */
  const choices = generateChoices(currentQuestion, selectedLevel);

  /* ★ 表示も currentQuestion を使う */
  displayChoices(choices, currentQuestion);
}

function checkAnswer(selected, correct) {
  if (isSamePattern(selected, correct)) {
    score++;
    document.getElementById("status").innerText = "⭕ 正解！";
  } else {
    document.getElementById("status").innerText = "❌ 不正解…";
  }
  document.getElementById("nextBtn").disabled = false;
}

function finishQuiz() {
  const time = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById("questionInfo").innerText = "終了（全10問）";
  document.getElementById("status").innerText =
    "総得点：" + score + "点　タイム：" + time + "秒";
  document.getElementById("choices").innerHTML =
    `<p><button onclick="backToLevel()">← レベル選択に戻る</button></p>`;
  document.getElementById("nextBtn").disabled = true;
}
</script>
