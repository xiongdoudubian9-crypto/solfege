<div id="screen-level">
  <p>レベルを選んでください。</p>
  <button onclick="selectLevel(1)">レベル1（四分音符・四分休符）</button><br>
  <button onclick="selectLevel(2)">レベル2（二分音符・四分音符・四分休符）</button><br>
  <button onclick="selectLevel(3)">レベル3（全音符・二分音符・四分音符・四分休符）</button><br>
  <button onclick="selectLevel(4)">レベル4（全音符・二分音符・四分音符・四分休符・二分休符）</button><br>
  <button onclick="selectLevel(5)">レベル5（レベル4の拡張）</button><br>
  <button onclick="selectLevel(6)">レベル6（付点二分音符を追加）</button><br>
</div>

<div id="screen-tempo" style="display:none;">
  <p>レベル <span id="levelLabel"></span> が選ばれました。</p>
  <p>テンポを選んでください。</p>
  <select id="tempoSelect">
      <option value="60">60</option>
      <option value="80">80</option>
      <option value="100">100</option>
      <option value="120">120</option>
  </select>
  <br><br>
  <button onclick="startQuiz()">▶ スタート</button>
  <button onclick="backToLevel()">← レベル選択に戻る</button>
</div>

<div id="screen-quiz" style="display:none;">
  <p id="questionInfo"></p>
  <p id="status"></p>

  <button id="playBtn" onclick="playCurrentRhythm()">▶ リズムを聞く</button>
  <button id="nextBtn" onclick="nextQuestion()" disabled>次の問題へ</button>

  <div id="choices"></div>
</div>

<script>
/* 拍数定義 */
const NOTE = {
  "whole": 4,
  "half": 2,
  "quarter": 1,
  "dotted_half": 3,
  "whole_rest": 4,
  "half_rest": 2,
  "quarter_rest": 1
};

/* レベルごとの使用音符 */
const LEVEL_NOTES = {
  1: ["quarter", "quarter_rest"],
  2: ["half", "quarter", "quarter_rest"],
  3: ["whole", "half", "quarter", "quarter_rest"],
  4: ["whole", "half", "quarter", "quarter_rest", "half_rest"],
  5: ["whole", "half", "quarter", "quarter_rest", "half_rest"],
  6: ["whole", "dotted_half", "half", "quarter", "quarter_rest", "half_rest"]
};

/* 🎯 正しい記譜法：音符は統合しない／休符は統合する */
function mergeRests(rhythm) {
  let merged = [];
  let restBuffer = 0;

  rhythm.forEach(note => {
    if (note.includes("rest")) {
      restBuffer += NOTE[note];
    } else {
      if (restBuffer > 0) {
        if (restBuffer === 1) merged.push("quarter_rest");
        if (restBuffer === 2) merged.push("half_rest");
        if (restBuffer === 4) merged.push("whole_rest");
        restBuffer = 0;
      }
      merged.push(note);
    }
  });

  if (restBuffer > 0) {
    if (restBuffer === 1) merged.push("quarter_rest");
    if (restBuffer === 2) merged.push("half_rest");
    if (restBuffer === 4) merged.push("whole_rest");
  }

  return merged;
}

/* 🎯 リズム生成（音符は統合しない／休符は統合） */
function generateRhythm(level) {
  const allowed = LEVEL_NOTES[level];
  let rhythm = [];
  let sum = 0;

  while (sum < 4) {
    const note = allowed[Math.floor(Math.random() * allowed.length)];
    const length = NOTE[note];
    if (sum + length <= 4) {
      rhythm.push(note);
      sum += length;
    }
  }

  return mergeRests(rhythm);
}

/* モールス信号（拍の長さを維持） */
function playMorse(time, duration, ctx) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "square";
  osc.frequency.value = 900;

  osc.connect(gain);
  gain.connect(ctx.destination);

  gain.gain.setValueAtTime(1.0, time);
  gain.gain.setValueAtTime(1.0, time + duration - 0.01);
  gain.gain.linearRampToValueAtTime(0.0, time + duration);

  osc.start(time);
  osc.stop(time + duration);
}

/* カスタネット */
function playCastanet(time, ctx) {
  const noise = ctx.createBufferSource();
  const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 200);
  }
  const filter = ctx.createBiquadFilter();
  filter.type = "highpass";
  filter.frequency.value = 1500;
  noise.buffer = buffer;
  noise.connect(filter);
  filter.connect(ctx.destination);
  noise.start(time);
}

/* 🎯 リズム再生（打ち直し／伸ばし／休符無音／完全同期） */
function playRhythm(rhythm, tempo) {
  const ctx = new AudioContext();
  const beat = 60 / tempo;
  let t = ctx.currentTime;

  /* 予備拍 */
  for (let i = 0; i < 4; i++) {
    playCastanet(t, ctx);
    t += beat;
  }

  const start = t;

  /* カスタネット（拍位置） */
  const totalBeats = rhythm.reduce((sum, note) => sum + NOTE[note], 0);
  for (let i = 0; i < totalBeats; i++) {
    playCastanet(start + i * beat, ctx);
  }

  /* 本体（音符ごとに打ち直す／休符は無音） */
  let cur = start;
  rhythm.forEach(note => {
    const dur = NOTE[note] * beat;

    if (note.includes("rest")) {
      cur += dur;
    } else {
      playMorse(cur, dur, ctx);
      cur += dur;
    }
  });
}

/* 譜例の見た目で比較（正解判定のズレ防止） */
function normalize(rhythm) {
  return rhythm.map(n => NOTE[n]).sort((a,b)=>a-b);
}
function isSamePattern(a, b) {
  return JSON.stringify(normalize(a)) === JSON.stringify(normalize(b));
}

/* 選択肢生成（見た目が同じ譜例は除外） */
function generateChoices(correct, level) {
  let choices = [correct];
  while (choices.length < 4) {
    const wrong = generateRhythm(level);
    if (!isSamePattern(wrong, correct)) {
      choices.push(wrong);
    }
  }
  choices.sort(() => Math.random() - 0.5);
  return choices;
}

/* 譜例表示（4/4 拍子を追加） */
function displayChoices(choices, correct) {
  const div = document.getElementById("choices");
  div.innerHTML = "";
  choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.innerHTML =
      `<span style="font-size:20px; font-weight:bold;">4/4</span> ` +
      choice.map(n => drawNoteSVG(n)).join("");
    btn.onclick = () => checkAnswer(choice, correct);
    div.appendChild(btn);
    div.appendChild(document.createElement("br"));
  });
}

/* 画面遷移・正解判定などは前回の完全版と同じ */
</script>
