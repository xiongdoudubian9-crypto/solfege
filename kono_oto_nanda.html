<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>この音なんだ？（完全版）</title>
<style>
  body { font-family: sans-serif; }
  #staff { border: 1px solid #ccc; margin: 10px 0; }
  .note-btn {
    margin: 4px;
    padding: 8px 14px;
    font-size: 18px;
  }
</style>
</head>
<body>

<h2>この音なんだ？（単音読み取り・楽譜規格準拠版）</h2>

<!-- 本物仕様のト音記号・へ音記号SVG -->
<img id="trebleClef" src="treble_clef.svg" style="display:none;">
<img id="bassClef" src="bass_clef.svg" style="display:none;">

<div id="screen-step">
  <p>ステップを選んでください。</p>
  <button onclick="selectStep(1)">ステップ1（ト音記号 C4〜B4）</button><br>
  <button onclick="selectStep(2)">ステップ2（ト音記号 C4〜G5）</button><br>
  <button onclick="selectStep(3)">ステップ3（ト音記号 加線2本まで）</button><br>
  <button onclick="selectStep(4)">ステップ4（へ音記号 C4〜C2）</button><br>
  <button onclick="selectStep(5)">ステップ5（総合 C2〜C6）</button><br>
</div>

<div id="screen-level" style="display:none;">
  <p>ステップ <span id="stepLabel"></span> が選ばれました。レベルを選んでください。</p>
  <div id="levelButtons"></div>
  <p><button onclick="backToStep()">← ステップ選択に戻る</button></p>
</div>

<div id="screen-quiz" style="display:none;">
  <p id="quizInfo"></p>
  <canvas id="staff" width="400" height="220"></canvas>
  <p>この音はどれ？（ド〜シ）</p>
  <div id="noteButtons"></div>
  <p id="status"></p>
  <button id="nextBtn" onclick="nextQuestion()" disabled>次の問題へ</button>
</div>

<script>
// MIDI対応
const NOTES = {
  "C2": 36, "D2": 38, "E2": 40, "F2": 41, "G2": 43, "A2": 45, "B2": 47,
  "C3": 48, "D3": 50, "E3": 52, "F3": 53, "G3": 55, "A3": 57, "B3": 59,
  "C4": 60, "D4": 62, "E4": 64, "F4": 65, "G4": 67, "A4": 69, "B4": 71,
  "C5": 72, "D5": 74, "E5": 76, "F5": 77, "G5": 79, "A5": 81, "B5": 83,
  "C6": 84
};

const SOLFEGE = { "C":"ド","D":"レ","E":"ミ","F":"ファ","G":"ソ","A":"ラ","B":"シ" };

// ステップ仕様
const STEP_LEVELS = {
  1: {
    1: ["C4","D4"],
    2: ["C4","D4","E4"],
    3: ["C4","D4","E4","F4"],
    4: ["C4","D4","E4","F4","G4"],
    5: ["C4","D4","E4","F4","G4","A4"],
    6: ["C4","D4","E4","F4","G4","A4","B4"]
  },
  2: {
    1: ["C4","D4","E4","F4","G4","A4","B4","C5"],
    2: ["C4","D4","E4","F4","G4","A4","B4","C5","D5"],
    3: ["C4","D4","E4","F4","G4","A4","B4","C5","D5","E5"],
    4: ["C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5"],
    5: ["C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5","G5"]
  },
  3: {
    1: ["A3","B3","C5","D5","E5","F5","G5"],
    2: ["A3","B3","C5","D5","E5","F5","G5","A5","B5","C6"]
  },
  4: {
    1: ["C4","B4","A4","G4","F4","E4","D4","C3"],
    2: ["C4","B4","A4","G4","F4","E4","D4","C3","B3","A3","G3","F3","E3","D3","C2"]
  },
  5: {
    1: ["C2","D2","E2","F2","G2","A2","B2",
        "C3","D3","E3","F3","G3","A3","B3",
        "C4","D4","E4","F4","G4","A4","B4",
        "C5","D5","E5","F5","G5","A5","B5","C6"]
  }
};

let currentStep = null;
let currentLevel = null;
let questions = [];
let currentIndex = 0;
let score = 0;

// ステップ選択
function selectStep(step) {
  currentStep = step;
  document.getElementById("stepLabel").innerText = step;
  document.getElementById("screen-step").style.display = "none";
  document.getElementById("screen-level").style.display = "block";

  const levelDiv = document.getElementById("levelButtons");
  levelDiv.innerHTML = "";
  const levels = STEP_LEVELS[step];
  Object.keys(levels).forEach(lv => {
    const btn = document.createElement("button");
    btn.textContent = "レベル " + lv;
    btn.onclick = () => selectLevel(parseInt(lv));
    levelDiv.appendChild(btn);
    levelDiv.appendChild(document.createElement("br"));
  });
}

function backToStep() {
  document.getElementById("screen-level").style.display = "none";
  document.getElementById("screen-step").style.display = "block";
}

// レベル選択
function selectLevel(level) {
  currentLevel = level;
  questions = STEP_LEVELS[currentStep][currentLevel].slice();
  currentIndex = 0;
  score = 0;

  document.getElementById("screen-level").style.display = "none";
  document.getElementById("screen-quiz").style.display = "block";

  setupNoteButtons();
  nextQuestion();
}

// ド〜シボタン
function setupNoteButtons() {
  const div = document.getElementById("noteButtons");
  div.innerHTML = "";
  ["C","D","E","F","G","A","B"].forEach(letter => {
    const btn = document.createElement("button");
    btn.className = "note-btn";
    btn.textContent = SOLFEGE[letter];
    btn.onclick = () => answer(letter);
    div.appendChild(btn);
  });
}

// 問題
function nextQuestion() {
  if (currentIndex >= 10) {
    finishQuiz();
    return;
  }

  document.getElementById("status").innerText = "";
  document.getElementById("nextBtn").disabled = true;

  const pool = STEP_LEVELS[currentStep][currentLevel];
  const noteName = pool[Math.floor(Math.random() * pool.length)];
  questions[currentIndex] = noteName;

  document.getElementById("quizInfo").innerText =
    "問題 " + (currentIndex + 1) + " / 10";

  drawStaffAndNote(noteName);
}

// 回答
function answer(letter) {
  const correctNote = questions[currentIndex];
  const correctLetter = correctNote[0];

  if (letter === correctLetter) {
    score++;
    document.getElementById("status").innerText = "⭕ 正解！";
  } else {
    document.getElementById("status").innerText =
      "❌ 不正解… 正解は「" + SOLFEGE[correctLetter] + "」";
  }

  currentIndex++;
  document.getElementById("nextBtn").disabled = false;
}

// 終了
function finishQuiz() {
  document.getElementById("quizInfo").innerText = "終了（全10問）";
  document.getElementById("status").innerText =
    "総得点：" + score + "点";
  document.getElementById("nextBtn").disabled = true;
}

// 五線＋音部記号＋音符
function drawStaffAndNote(noteName) {
  const canvas = document.getElementById("staff");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const spacing = 10;
  const top = 60; // 上の線のY

  // 五線（下から第1〜5線）
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    const y = top + i * spacing;
    ctx.beginPath();
    ctx.moveTo(40, y);
    ctx.lineTo(360, y);
    ctx.stroke();
  }

  const midi = NOTES[noteName];
  const clef = getClefForNote(noteName);

  // 音部記号
  if (clef === "bass") {
    const img = document.getElementById("bassClef");
    ctx.drawImage(img, 40, top - 5, 60, 120);
  } else {
    const img = document.getElementById("trebleClef");
    ctx.drawImage(img, 40, top - 40, 60, 140);
  }

  // 音符位置（楽譜規格準拠）
  const y = getNoteY(midi, clef);

  // 丸譜
  const x = 220;
  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.ellipse(x, y, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // 加線
  drawLedgerLines(ctx, x, midi, clef);
}

// 総合ステップでの音部記号判定
function getClefForNote(noteName) {
  if (currentStep === 4) return "bass";
  if (currentStep === 1 || currentStep === 2 || currentStep === 3) return "treble";
  // ステップ5：C4より下はへ音記号、それ以上はト音記号
  const midi = NOTES[noteName];
  return midi <= NOTES["C4"] ? "bass" : "treble";
}

// 音符Y座標（本物規格）
function getNoteY(midi, clef) {
  const spacing = 10;
  const firstLineY = 60 + 4 * spacing; // 下の線（第1線）

  let baseMidi;
  if (clef === "treble") {
    // ト音記号：E4（第1線）
    baseMidi = 64;
  } else {
    // へ音記号：G2（第1線）
    baseMidi = 43;
  }

  const steps = (midi - baseMidi) / 2; // 1段=全音=2MIDI

  const y = firstLineY - steps * (spacing / 2);
  return y;
}

// 加線（本物規格）
function drawLedgerLines(ctx, x, midi, clef) {
  const spacing = 10;
  const topLineY = 60;              // 第5線（上）
  const firstLineY = 60 + 4 * spacing; // 第1線（下）

  let baseMidi = (clef === "treble") ? 64 : 43;
  const steps = (midi - baseMidi) / 2;

  const ledgerCount = Math.floor(Math.abs(steps) / 2);

  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1;

  for (let i = 1; i <= ledgerCount; i++) {
    let y;
    if (steps < 0) {
      // 下側加線
      y = firstLineY + i * spacing;
    } else {
      // 上側加線
      y = topLineY - i * spacing;
    }
    ctx.beginPath();
    ctx.moveTo(x - 12, y);
    ctx.lineTo(x + 12, y);
    ctx.stroke();
  }
}
</script>

<p><a href="read.html">← 読むメニューに戻る</a></p>

</body>
</html>
